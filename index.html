<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priority Ranking Widget</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>
</head>

<body>
    <div class="container">

        <div class="instructions">
            Please rank the following issue areas from
            <strong>1 (most important)</strong> to
            <strong>4 (least important)</strong>.
            Each rank may only be used once.
        </div>

        <div id="rankingContainer"></div>

        <div id="error"></div>

    </div>

    <script src="script.js"></script>

    <script>
        function resizeWidget() {
            if (window.JFCustomWidget) {
                JFCustomWidget.requestFrameResize({
                    height: document.body.scrollHeight + 50
                });
            }
        }

        window.addEventListener('load', resizeWidget);
        window.addEventListener('resize', resizeWidget);
    </script>

</body>

</html>
