<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Priority Ranking Widget</title>

<link rel="stylesheet" href="style.css">

<script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>

</head>

<body>

<div class="container">

    <div class="instructions">
        Please rank the following issue areas from
        <strong>1 (most important)</strong> to
        <strong>N (least important)</strong>.
        Each rank may only be used once.
    </div>

    <table class="ranking-table">

        <thead>
            <tr>
                <th>Issue Area</th>
                <th class="rank-header">Rank</th>
            </tr>
        </thead>

        <tbody id="tableBody"></tbody>

    </table>

    <div id="error"></div>

</div>

<script src="script.js"></script>

</body>
</html>
